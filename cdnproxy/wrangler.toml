name = "plotvideos-cdn-proxy"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Non-secret config (override in dashboard or here):
[vars]
B2_BUCKET = "plotvideos"
B2_REGION = "eu-central-003"
B2_KEY_ID = "0037609875cef990000000001"
CORS_ALLOWS = """
http://localhost:8000
https://plotvideos.com
"""


# Sensitive: set for production with:
#   wrangler secret put B2_KEY_ID
#   wrangler secret put B2_APP_KEY
# Local dev: add B2_KEY_ID and B2_APP_KEY to .dev.vars (see .dev.vars.example)
