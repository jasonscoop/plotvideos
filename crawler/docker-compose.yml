services:
  tor:
    image: dperson/torproxy
    restart: unless-stopped
    cpus: "0.25"
    mem_limit: 192m
    memswap_limit: 384m

  s1_fetch:
    build: .
    restart: "no"
    env_file:
      - .env
    volumes:
      - ./works:/workspace/works
    cpus: "0.35"
    mem_limit: 384m
    memswap_limit: 768m
    command:
      - python
      - -m
      - pipeline
      - --runner=s1_fetch
      - --lock-file=/workspace/works/locks/pipeline-s1_fetch.lock

  s2_download:
    build: .
    restart: "no"
    env_file:
      - .env
    environment:
      YT_DLP_PROXY: socks5://tor:9050
    depends_on:
      - tor
    volumes:
      - ./works:/workspace/works
    cpus: "0.4"
    mem_limit: 1536m
    memswap_limit: 2304m
    command:
      - python
      - -m
      - pipeline
      - --runner=s2_download
      - --lock-file=/workspace/works/locks/pipeline-s2_download.lock

  s3_convert:
    build: .
    restart: "no"
    env_file:
      - .env
    volumes:
      - ./works:/workspace/works
    cpus: "0.8"
    mem_limit: 2048m
    memswap_limit: 3072m
    command:
      - python
      - -m
      - pipeline
      - --runner=s3_convert
      - --lock-file=/workspace/works/locks/pipeline-s3_convert.lock

  s4_subtitle:
    build: .
    restart: "no"
    env_file:
      - .env
    volumes:
      - ./works:/workspace/works
    cpus: "2.25"
    mem_limit: 5824m
    memswap_limit: 7168m
    command:
      - python
      - -m
      - pipeline
      - --runner=s4_subtitle
      - --lock-file=/workspace/works/locks/pipeline-s4_subtitle.lock

  s5_translate_vtt:
    build: .
    restart: "no"
    env_file:
      - .env
    volumes:
      - ./works:/workspace/works
    cpus: "0.55"
    mem_limit: 512m
    memswap_limit: 768m
    command:
      - python
      - -m
      - pipeline
      - --runner=s5_translate_vtt
      - --lock-file=/workspace/works/locks/pipeline-s5_translate_vtt.lock

  s6_translate_meta:
    build: .
    restart: "no"
    env_file:
      - .env
    volumes:
      - ./works:/workspace/works
    cpus: "0.35"
    mem_limit: 512m
    memswap_limit: 768m
    command:
      - python
      - -m
      - pipeline
      - --runner=s6_translate_meta
      - --lock-file=/workspace/works/locks/pipeline-s6_translate_meta.lock

  s7_hls:
    build: .
    restart: "no"
    env_file:
      - .env
    volumes:
      - ./works:/workspace/works
    cpus: "0.75"
    mem_limit: 768m
    memswap_limit: 1152m
    command:
      - python
      - -m
      - pipeline
      - --runner=s7_hls
      - --lock-file=/workspace/works/locks/pipeline-s7_hls.lock

  s8_upload:
    build: .
    restart: "no"
    env_file:
      - .env
    volumes:
      - ./works:/workspace/works
    cpus: "0.35"
    mem_limit: 512m
    memswap_limit: 768m
    command:
      - python
      - -m
      - pipeline
      - --runner=s8_upload
      - --lock-file=/workspace/works/locks/pipeline-s8_upload.lock
