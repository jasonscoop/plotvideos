services:
  tor:
    image: dperson/torproxy
    restart: unless-stopped

  crawler:
    build: .
    restart: unless-stopped
    cpus: "8"
    mem_limit: 8g
    memswap_limit: 12g
    env_file:
      - .env
    environment:
      YT_DLP_PROXY: socks5://tor:9050
    depends_on:
      - tor
    volumes:
      - ./works:/workspace/works
    command: python -m scheduler --runner=all

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8999:8001"
    command: python -m api
