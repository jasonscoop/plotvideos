services:
  tor:
    image: dperson/torproxy
    container_name: tor
    restart: unless-stopped
    ports:
      - "9050:9050"

  crawler:
    build: .
    container_name: crawler
    restart: unless-stopped
    cpus: "4"
    mem_limit: 4g
    memswap_limit: 12g
    env_file:
      - .env
    depends_on:
      - tor
    volumes:
      - ./works:/workspace/works
    command: python -m crawler.main --runner=all

  retranslate:
    build: .
    container_name: retranslate
    env_file:
      - .env
    volumes:
      - ./works:/workspace/works
      - ./scripts:/workspace/scripts
    command: python scripts/python/translate_vtt.py

  web:
    build: .
    container_name: web
    env_file:
      - .env
    depends_on:
      - crawler
    ports:
      - "8000:8000"
    volumes:
      - ./works:/workspace/works
    command: uvicorn web.main:app --host 0.0.0.0 --port 8000
