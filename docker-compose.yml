services:
  tor:
    image: dperson/torproxy
    container_name: tor
    restart: unless-stopped
    ports:
      - "9050:9050"

  crawler:
    build: .
    container_name: crawler
    restart: unless-stopped
    cpus: "4"
    mem_limit: 4g
    memswap_limit: 12g
    env_file:
      - .env
    depends_on:
      - tor
    volumes:
      - ./works:/workspace/works
    command: python -m crawler.scheduler --runner=all

  api:
    build: .
    container_name: api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8001"
    volumes:
      - ./works:/workspace/works
    command: uvicorn crawler.api:app --host 0.0.0.0 --port 8001

  web:
    build: .
    container_name: web
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uvicorn web.main:app --host 0.0.0.0 --port 8000
