services:
  tor:
    image: dperson/torproxy
    restart: unless-stopped
    ports:
      # Host scripts / YT_DLP_PROXY=socks5://localhost:9050
      - "9050:9050"

  crawler:
    build: .
    restart: unless-stopped
    cpus: "4"
    mem_limit: 4g
    memswap_limit: 12g
    env_file:
      - .env
    depends_on:
      - tor
    volumes:
      - ./works:/workspace/works
    command: python -m crawler.scheduler --runner=all

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8999:8001"
    command: uvicorn crawler.api:app --host 0.0.0.0 --port 8001
