services:
  s1_fetch:
    build: .
    env_file:
      - .env
    volumes:
      - ./works:/workspace/works
    command: python src/service/s1_fetch.py ${BATCH_SIZE:-10} ${MAX_PAGES:-3}

  s2_download:
    build: .
    env_file:
      - .env
    volumes:
      - ./works:/workspace/works
    command: python src/service/s2_download.py ${BATCH_SIZE:-10} ${HOST:-""}

  s3_convert:
    build: .
    cpus: 2
    mem_limit: 4g
    memswap_limit: 10g
    env_file:
      - .env
    volumes:
      - ./works:/workspace/works
    command: python src/service/s3_convert.py ${BATCH_SIZE:-10} ${HOST:-""}

  s4_subtitle:
    build: .
    env_file:
      - .env
    volumes:
      - ./works:/workspace/works
    command: python src/service/s4_subtitle.py ${BATCH_SIZE:-10} ${HOST:-""}

  s5_translate_vtt:
    build: .
    env_file:
      - .env
    volumes:
      - ./works:/workspace/works
    command: python src/service/s5_translate_vtt.py ${BATCH_SIZE:-10} ${HOST:-""}

  s6_translate_meta:
    build: .
    env_file:
      - .env
    volumes:
      - ./works:/workspace/works
    command: python src/service/s6_translate_meta.py ${BATCH_SIZE:-10} ${HOST:-""}

  s7_upload:
    build: .
    env_file:
      - .env
    volumes:
      - ./works:/workspace/works
    command: python src/service/s7_upload.py ${BATCH_SIZE:-10} ${HOST:-""}

  s8_cleanup:
    build: .
    env_file:
      - .env
    volumes:
      - ./works:/workspace/works
    command: python src/service/s8_cleanup.py ${BATCH_SIZE:-10} ${HOST:-""}
