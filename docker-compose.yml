services:
  s1_fetch:
    build: .
    volumes:
      - ./works:/app/works
    command: python src/service/s1_fetch.py

  s2_download:
    build: .
    command: python src/service/s2_download.py

  s3_subtitle:
    build: .
    command: python src/service/s3_subtitle.py

  s4_translate_vtt:
    build: .
    command: python src/service/s4_translate_vtt.py

  s5_translate_meta:
    build: .
    command: python src/service/s5_translate_meta.py

  s6_upload:
    build: .
    command: python src/service/s6_upload.py
