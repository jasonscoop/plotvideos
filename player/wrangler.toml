name = "plotvideos-player"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[[rules]]
type = "Text"
globs = ["**/*.css"]
fallthrough = true

[[rules]]
type = "Text"
globs = ["**/*.client.js"]
fallthrough = true

[dev]
port = 8000

[[d1_databases]]
binding = "DB"
database_name = "plotvideos-db"
database_id = "local"

[triggers]
crons = ["*/10 * * * *"]

[vars]
VIDEO_FETCH_API_URL = ""
VIDEO_FETCH_API_KEY = ""
# Optional; if you omit this key entirely, runtime defaults to 0 (see parseSlugOffsetValue).
SLUG_OFFSET_VALUE = "0"
