# SITE_NAME: set only in the Cloudflare dashboard (Workers → plotvideos → Settings → Variables).
# Do not add SITE_NAME to [vars] below or to .dev.vars — a deploy or local dev would override the portal value.
name = "plotvideos"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[[rules]]
type = "Text"
globs = ["**/*.css"]
fallthrough = true

[[rules]]
type = "Text"
globs = ["**/*.client.js"]
fallthrough = true

[dev]
port = 8000

[[d1_databases]]
binding = "DB"
database_name = "plotvideos-db"
database_id = "331653b8-0b55-42f2-9d10-24d9c58dc3dc"

[triggers]
crons = ["*/10 * * * *"]

[vars]
SLUG_OFFSET_VALUE = "21753"
