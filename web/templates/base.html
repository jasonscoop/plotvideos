<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}LuckVideos{% endblock %}</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col">
    <header class="border-b border-gray-800 bg-gray-900/80 backdrop-blur">
      <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
        <a href="/" class="flex items-center space-x-2">
          <span
            class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-red-600 text-white font-bold"
            >LV</span
          >
          <span class="font-semibold text-lg tracking-tight">LuckVideos</span>
        </a>
        <form
          action="/"
          method="get"
          class="flex-1 max-w-md mx-4 hidden sm:flex"
        >
          <input
            type="text"
            name="q"
            value="{{ q | default('') }}"
            placeholder="Search videos..."
            class="w-full px-3 py-1.5 rounded-l-full bg-gray-800 border border-gray-700 text-sm focus:outline-none focus:ring-1 focus:ring-red-500 focus:border-red-500"
          />
          <button
            type="submit"
            class="px-4 py-1.5 rounded-r-full bg-red-600 hover:bg-red-700 text-sm font-medium"
          >
            Search
          </button>
        </form>
      </div>
    </header>

    <main class="flex-1 max-w-6xl mx-auto w-full px-4 py-4">
      {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-gray-800 bg-gray-900 text-xs text-gray-500">
      <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between">
        <span>&copy; {{ 2026 }} LuckVideos</span>
        <span>Powered by FastAPI &amp; Postgres</span>
      </div>
    </footer>
  </body>
</html>
